<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class = "flex min-h-screen justify-center items-center bg-blue-200">

<div class = "bg-white w-full max-w-md p-10 rounded-3xl shadow-lg">
    <h1 class = "text-blue-400 text-3xl font-bold text-center mb-6">easycloud</h1>

    <form id="loginForm" class = "space-y-5">
        <div>
            <label class = "block text-sm font-medium mb-2">Login</label>
            <input class = "w-full border-solid border-2 rounded-md p-2" type="text" id="login" placeholder="Enter your email">
        </div>

        <div>
            <label class = "block text-sm font-medium mb-2">Password</label>
            <input class = "w-full border-solid border-2 rounded-md p-2" type="password" id="password" placeholder="Enter your password">
        </div>

        <button class = "w-full rounded-md p-1.5 bg-blue-400 text-md text-white" type="submit">Register</button>
    </form>

    <script src = "/static/js/register-script.js"></script>

    <p class = "w-full text-center mt-1.5">
        Already have an account? <a href="/login" class = "text-blue-400">Sign in</a>
    </p>
</div>

</body>
</html>
