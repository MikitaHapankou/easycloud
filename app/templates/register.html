<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register easycloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="relative flex min-h-screen items-center justify-center overflow-hidden bg-slate-500 p-4">

<div class="pointer-events-none absolute -top-40 left-1/2 h-96 w-96 -translate-x-1/2 rounded-full bg-indigo-600/20 blur-3xl"></div>
<div class="relative w-full max-w-md rounded-2xl border border-slate-800 bg-slate-50 p-10 shadow-2xl shadow-black/50">

    <div class="mb-8 flex flex-col items-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">easycloud</h1>
        <p class="mt-1.5 text-sm text-slate-500">Create your encrypted storage account</p>
    </div>

    <form id="loginForm" class="space-y-5">
        <div>
            <label class="mb-1.5 block text-sm font-medium text-slate-700">Login</label>
            <input class="w-full rounded-xl border border-slate-300 bg-white p-2.5 text-slate-900 outline-none transition-colors focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" type="text" id="login" placeholder="Enter your email">

            <p id="login-error" class="hidden mt-1 text-xs font-medium text-red-500"></p>
        </div>

        <div>
            <label class="mb-1.5 block text-sm font-medium text-slate-700">Password</label>
            <input class="w-full rounded-xl border border-slate-300 bg-white p-2.5 text-slate-900 outline-none transition-colors focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" type="password" id="password" placeholder="Enter your password">

            <p id="password-error" class="hidden mt-1 text-xs font-medium text-red-500"></p>
        </div>

        <button class="w-full rounded-xl bg-indigo-600 p-2.5 text-sm font-semibold text-white shadow-md shadow-indigo-600/20 transition-colors hover:bg-indigo-700 active:bg-indigo-800" type="submit">Register</button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
        Already have an account? <a href="/login" class="font-medium text-indigo-600 hover:text-indigo-700 hover:underline">Sign in</a>
    </p>
</div>

<script type="module" src="/static/js/register-script.js"></script>
</body>
</html>
