<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mhcloud Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        .topbar {
            width: 100%;
            height: 70px;

            background: #1e293b;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 40px;

            border-bottom: 1px solid #334155;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .username {
            color: #cbd5e1;
            font-size: 15px;
        }

        .logout-btn {
            padding: 10px 16px;

            border: none;
            border-radius: 10px;

            background: #ef4444;
            color: white;

            font-size: 14px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .dashboard-wrapper {
            display: flex;
            justify-content: center;

            padding: 50px 20px;
        }

        .dashboard-card {
            width: 800px;

            background: #1e293b;

            border-radius: 18px;

            padding: 40px;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.3);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            color: white;
            font-size: 32px;
        }

        .upload-btn {
            padding: 12px 18px;

            border: none;
            border-radius: 10px;

            background: #3b82f6;
            color: white;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        .upload-btn:hover {
            background: #2563eb;
        }

        .files-container {
            background: #0f172a;

            border-radius: 16px;

            padding: 20px;

            min-height: 300px;
        }

        .file-item {
            display: flex;
            align-items: center;

            padding: 16px;

            margin-bottom: 14px;

            background: #334155;

            border-radius: 12px;

            color: white;
            text-decoration: none;

            transition: 0.2s;
        }

        .file-item:hover {
            background: #475569;
        }

    </style>
</head>
<body>

<div class="topbar">

    <div class="logo">
        mhcloud
    </div>

    <div class="topbar-right">

        <div class="username">
            Username
        </div>

        <button class="logout-btn">
            Logout
        </button>

    </div>

</div>


<div class="dashboard-wrapper">

    <div class="dashboard-card">

        <div class="dashboard-header">

            <h1>My Files</h1>

            <button class="upload-btn">
                Upload File
            </button>

        </div>

        <div class="files-container" id="filesContainer">

            <!-- FILES WILL BE INSERTED HERE -->

            <!-- Example -->
            <!--
            <a href="#" class="file-item">
                photo.png
            </a>
            -->

            <!-- Empty state -->
            <!--
            <div class="empty-text">
                No files uploaded yet
            </div>
            -->

        </div>

    </div>

</div>
<script>
    addEventListener("DOMContentLoaded", async (event) => {
        const token = localStorage.getItem("token");

        const res = await fetch("/dashboard/my", {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
        })

        const data = await res.json()
        console.log(data)
        if (res.ok) {
            document.querySelector(".username").innerText = data.username;
            let fileList = document.getElementById("filesContainer");
            for (const filename of data.files) {
                const a = document.createElement("a");
                a.classList.add("file-item");
                a.href = "/";
                a.innerText = filename;
                fileList.appendChild(a);
            }
        } else {
            window.location.href = "/";
        }

    });
</script>

</body>
</html>
