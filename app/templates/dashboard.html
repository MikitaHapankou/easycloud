<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mhcloud Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        .share-btn {
            padding: 6px 12px;
            background: #10b981;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 15px;
        }

        .share-btn:hover {
            background: #059669;
        }

        .dir-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            color: #f8fafc;
            padding: 12px 14px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .topbar {
            width: 100%;
            height: 70px;

            background: #1e293b;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 40px;

            border-bottom: 1px solid #334155;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .username {
            color: #cbd5e1;
            font-size: 15px;
        }

        .logout-btn {
            padding: 10px 16px;

            border: none;
            border-radius: 10px;

            background: #ef4444;
            color: white;

            font-size: 14px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .dashboard-wrapper {
            display: flex;
            justify-content: center;

            padding: 50px 20px;
        }

        .dashboard-card {
            width: 800px;

            background: #1e293b;

            border-radius: 18px;

            padding: 40px;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.3);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            color: white;
            font-size: 32px;
        }

        .upload-btn {
            padding: 12px 18px;

            border: none;
            border-radius: 10px;

            background: #3b82f6;
            color: white;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        .upload-btn:hover {
            background: #2563eb;
        }

        .files-container {
            background: #0f172a;

            border-radius: 16px;

            padding: 20px;

            min-height: 300px;
        }
        .dir {
            margin-left: 22px;
            margin-top: 10px;

            border-left: 2px solid #334155;

            padding-left: 16px;
        }

        .dir-header {
            display: flex;
            align-items: center;

            background: #1e293b;

            color: #f8fafc;

            padding: 12px 14px;

            border-radius: 10px;

            font-weight: bold;

            margin-bottom: 10px;

            transition: 0.2s;
        }

        .dir-header:hover {
            background: #334155;
        }

        .dir-children {
            margin-top: 8px;
        }

        .file-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 8px 14px;
            margin-bottom: 5px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .file-item {
            color: #38bdf8;
            text-decoration: none;
            flex-grow: 1;
        }

        .file-item:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="topbar">

    <div class="logo">
        mhcloud
    </div>

    <div class="topbar-right">

        <div class="username">
            Username
        </div>

        <button class="logout-btn" type="button" id="logout-btn">
            Logout
        </button>

    </div>

</div>


<div class="dashboard-wrapper">

    <div class="dashboard-card">

        <div class="dashboard-header">

            <h1>My Files</h1>

            <button class="upload-btn">
                Upload File
            </button>

        </div>

        <div class="files-container" id="filesContainer">

            <!-- FILES WILL BE INSERTED HERE -->

            <!-- Example -->
            <!--
            <a href="#" class="file-item">
                photo.png
            </a>
            -->

            <!-- Empty state -->
            <!--
            <div class="empty-text">
                No files uploaded yet
            </div>
            -->

        </div>

    </div>

</div>
<script>
    document.getElementById("logout-btn").addEventListener("click", () => {
        fetch ("/users/logout");
        window.location.href="/";
    });

    addEventListener("DOMContentLoaded", async (event) => {
        const res = await fetch("/dashboard/my", {
            credentials: "include"
        })

        const data = await res.json()

        if (res.ok) {
            document.querySelector(".username").innerText = data.username;

            const itemMap = {};
            const rootItems = [];

            data.files.forEach(item => {
               itemMap[item.id] = { ...item, children: [] };
            });

            data.files.forEach(item => {
               const mappedItem = itemMap[item.id];

               if (item["parent_id"] === "filesContainer"){
                   rootItems.push(mappedItem);
               }
               else{
                   const parent = itemMap[item["parent_id"]];
                   if (parent) {
                       parent.children.push(mappedItem);
                   }
               }
            });

            const renderTree = (nodes) => {
                nodes.forEach(node => {
                    let parentElement = document.getElementById(node["parent_id"]);

                    if (node.type === 'dir'){
                        const dir = document.createElement("div");
                        dir.classList.add("dir");
                        dir.id = node["id"];

                        const dirHeader = document.createElement("div");
                        dirHeader.classList.add("dir-header");

                        const dirNameSpan = document.createElement("span");
                        dirNameSpan.innerText = node.name;

                        const shareBtn = document.createElement("button");
                        shareBtn.innerText = "Share";
                        shareBtn.classList.add("share-btn");

                        shareBtn.onclick = async () => {
                            const targetLogin = prompt(`Sharing folder '${node.name}'.\nType in user login you want to share with:`);

                            if (targetLogin) {
                                try {
                                    const response = await fetch(`/dashboard/share?dirname=${node.name}&target_login=${targetLogin}&action=read`, {
                                        method: "POST"
                                    });

                                    const result = await response.json();

                                    if (response.ok) {
                                        alert("Success " + result.detail);
                                    } else {
                                        alert("Error: " + result.detail);
                                    }
                                } catch (error) {
                                    alert("An error occured");
                                }
                            }
                        };

                        dirHeader.appendChild(dirNameSpan);
                        dirHeader.appendChild(shareBtn);

                        const childrenContainer = document.createElement("div");
                        childrenContainer.classList.add("dir-children");

                        dir.appendChild(dirHeader);
                        dir.appendChild(childrenContainer);

                        parentElement.appendChild(dir);

                        renderTree(node.children);
                    }
                    else {
                        const fileDiv = document.createElement("div");
                        fileDiv.classList.add("file-container");

                        const a = document.createElement("a");
                        a.classList.add("file-item");
                        a.href = `/dashboard/download/${node["path"]}`;
                        a.innerText = node["name"];

                        const shareBtn = document.createElement("button");
                        shareBtn.innerText = "Share";
                        shareBtn.classList.add("share-btn");

                        shareBtn.onclick = async () => {
                            const targetLogin = prompt(`Share file: '${node.name}'.\nType in login of user you want to share file with:`);

                            if (targetLogin) {
                                try {
                                    let safePath = encodeURIComponent(node["path"].replace(/\/$/, ""));

                                    const response = await fetch(`/dashboard/share?dirname=${safePath}&target_login=${targetLogin}&action=read`, {
                                        method: "POST"
                                    });

                                    const result = await response.json();

                                    if (response.ok) {
                                        alert("Success: " + result.detail);
                                    } else {
                                        alert("Error: " + result.detail);
                                    }
                                } catch (error) {
                                    alert("An error occured");
                                }
                            }
                        };

                        fileDiv.appendChild(a);
                        fileDiv.appendChild(shareBtn);

                        parentElement.appendChild(fileDiv);
                    }
                })
            }

            renderTree(rootItems);

        } else {
            window.location.href = "/";
        }

    });
</script>

</body>
</html>
