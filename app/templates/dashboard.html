<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easycloud dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-slate-500">

    <div class="flex w-full h-16 items-center justify-between px-8 bg-white shadow-sm">
        <div class="text-blue-400 text-3xl font-bold">
            easycloud
        </div>

        <div class="flex items-center gap-6">
            <div class="text-gray-800 font-medium" id="username">
                Username
            </div>
            <button class="text-blue-400 font-medium hover:text-blue-500 transition-colors" type="button" id="logout-btn">
                Logout
            </button>
        </div>
    </div>

    <main class="flex-1 w-full max-w-5xl mx-auto p-6 mt-4 md:mt-8">

        <div class="bg-white w-full p-10 rounded-3xl shadow-lg">

            <div class="flex items-center justify-between mb-6 pb-4 border-b-2 border-gray-100">
                <h1 class="text-2xl font-bold text-gray-800">My Files</h1>

                <div>
                    <label for="input" class="inline-block rounded-md p-1.5 px-5 bg-blue-400 text-md text-white font-medium cursor-pointer hover:bg-blue-500 transition-colors shadow-sm">
                        Upload file
                    </label>
                    <input type="file" id="input" multiple class="hidden" />
                </div>
            </div>

            <div class="min-h-[300px] flex flex-col gap-1" id="filesContainer">
                </div>

        </div>
    </main>

    <script src="/static/js/dashboard-script.js"></script>
</body>
</html>
